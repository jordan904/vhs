<!doctype html>
<html lang="en">

    <meta name="description" content="Versatile Home Solutions provides premium metal roofing, decks, sheds, fences, and exterior projects in the Annapolis Valley and surrounding Nova Scotia communities. Request a free estimate today." />
    
    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Versatile Home Solutions | Your Vision Is Our Priority" />
    <meta property="og:description" content="Premium metal roofing, decks, sheds, fences, and exterior projects in Nova Scotia's Annapolis Valley." />
    <meta property="og:image" content="/images/VHS_Logo.jpg" />
    <meta property="og:locale" content="en_CA" />
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Versatile Home Solutions | Your Vision Is Our Priority" />
    <meta name="twitter:description" content="Premium metal roofing, decks, sheds, fences, and exterior projects in Nova Scotia's Annapolis Valley." />
    <meta name="twitter:image" content="/images/VHS_Logo.jpg" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/jpeg" href="/images/VHS_Logo.jpg" />
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600&family=Playfair+Display:wght@400;500;600;700&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    
    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "HomeAndConstructionBusiness",
      "name": "Versatile Home Solutions",
      "description": "Premium metal roofing, decks, sheds, fences, and exterior projects in Nova Scotia",
      "slogan": "Your Vision Is Our Priority",
      "areaServed": {
        "@type": "Place",
        "name": "Annapolis Valley and surrounding Nova Scotia communities"
      },
      "serviceType": ["Metal Roofing", "Deck Construction", "Shed Building", "Fence Installation", "Exterior Projects"],
      "address": {
        "@type": "PostalAddress",
        "addressRegion": "Nova Scotia",
        "addressCountry": "CA"
      }
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Versatile Home Solutions",
      "url": "https://versatilehomesolutions.ca"
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
